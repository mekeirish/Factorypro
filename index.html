<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Base</title>
    <style>
        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111111;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 8px;
            background-image: 
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.06"/></svg>'),
                linear-gradient(180deg, #2a2a2a 0%, #151515 100%);
            border-bottom: 3px solid #080808;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 8px 20px rgba(0, 0, 0, 0.8);
            z-index: 10;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: auto;
        }

        .btn-socket {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0f0f0f;
            padding: 6px 3px 8px 3px;
            border-radius: 10px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.9), 0 1px 1px rgba(255, 255, 255, 0.05);
            gap: 5px;
            min-width: 44px;
        }

        .power-socket {
            background: #050505;
            border: 1px solid #000;
        }

        .led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #222222;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.8);
            transition: all 0.15s ease;
        }

        .power-socket .led { background-color: #4a0000; }

        .pwa-btn {
            width: 100%;
            border: none;
            padding: 12px 0;
            border-radius: 5px;
            font-weight: 800;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888888;
            cursor: pointer;
            position: relative;
            background: linear-gradient(180deg, #3d3d3d 0%, #222222 100%);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 4px 0 #111111,
                0 5px 6px rgba(0, 0, 0, 0.6);
            transition: none;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 32px;
        }

        .power-btn { 
            background: linear-gradient(180deg, #4a2222 0%, #221111 100%);
            font-size: 8px;
            letter-spacing: 1px;
        }

        .pwa-btn.active {
            color: #ffffff;
            background: linear-gradient(180deg, #1e1e1e 0%, #2a2a2a 100%);
            transform: translateY(4px);
            box-shadow: 
                inset 0 2px 5px rgba(0, 0, 0, 0.8),
                0 0px 0 #111111,
                0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn-socket.active-power .led  { background-color: #ff3b30; box-shadow: 0 0 10px #ff3b30, inset 0 1px 1px rgba(255,255,255,0.6); }
        .btn-socket.active-pwa .led    { background-color: #5e5ce0; box-shadow: 0 0 10px #5e5ce0, inset 0 1px 1px rgba(255,255,255,0.6); }

        .workspace {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-color: #0c0c0c;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            max-width: 412px;
            max-height: 860px;
            background-color: #000000;
            border-radius: 36px;
            border: 8px solid #282828;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.9), 0 30px 60px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen-glass {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        /* ===== OVERLAY AMÉLIORÉ : EFFET "GRAVÉ" ===== */
        .power-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000;
            z-index: 30;
            transition: opacity 0.3s ease-out;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .power-overlay.cover-image {
            /* Image en niveaux de gris avec contraste renforcé */
            filter: grayscale(100%) contrast(1.2) brightness(0.9);
            opacity: 0.3;
            
            /* Texture de bruit SVG en superposition */
            background-blend-mode: overlay;
            background-image: 
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.15"/></svg>'),
                url('cover.png');
            
            /* Ombre interne pour la profondeur */
            box-shadow: 
                inset 0 8px 20px rgba(0,0,0,0.8),
                inset 0 -4px 10px rgba(255,255,255,0.03);
            
            /* Bord biseauté */
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 4px;
            
            background-size: cover, cover;
            background-position: center, center;
        }

        /* Lueur néon centrale (facultative) */
        .power-overlay.cover-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(94,92,224,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .hub-powered-on .power-overlay {
            opacity: 0;
            pointer-events: none;
        }

        .content-area {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #111111;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #1a1a1a;
            display: none;
        }

        iframe.active {
            display: block;
        }

        @media (max-width: 480px) {
            .workspace { padding: 0; }
            .phone-container {
                max-width: 100%; max-height: 100%;
                border-radius: 0; border: none; box-shadow: none;
            }
            .screen-glass { display: none; }
        }

        /* ===== MODALE AMÉLIORÉE - STYLE CYBER SKEUOMORPHIQUE ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            backdrop-filter: blur(6px);
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: radial-gradient(ellipse at 20% 30%, #1a1a2e, #0d0d1a 80%);
            border-radius: 24px;
            max-width: 520px;
            width: 100%;
            padding: 28px 24px 30px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.9),
                inset 0 0 40px rgba(94, 92, 224, 0.08),
                inset 0 1px 1px rgba(255,255,255,0.06);
            border: 1px solid rgba(94, 92, 224, 0.25);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-box::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(94,92,224,0.3), rgba(10,132,255,0.1), rgba(94,92,224,0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            border-bottom: 1px solid rgba(94,92,224,0.15);
            padding-bottom: 12px;
        }
        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #b8b8ff, #7a78ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(94,92,224,0.2);
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
            line-height: 1;
            transition: color 0.2s, text-shadow 0.2s;
            text-shadow: 0 0 5px rgba(255,255,255,0);
        }
        .modal-close:hover {
            color: #b8b8ff;
            text-shadow: 0 0 15px rgba(94,92,224,0.5);
        }

        .modal-field {
            margin-bottom: 16px;
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(94,92,224,0.12);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 1px 1px rgba(255,255,255,0.03);
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .modal-field:hover {
            border-color: rgba(94,92,224,0.3);
        }
        .modal-field .field-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .modal-field .field-row label {
            font-size: 10px;
            text-transform: uppercase;
            color: #7a78ff;
            letter-spacing: 0.8px;
            min-width: 34px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(94,92,224,0.2);
        }
        .modal-field .field-row input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(94,92,224,0.15);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .modal-field .field-row input:focus {
            outline: none;
            border-color: #5e5ce0;
            box-shadow: 0 0 15px rgba(94,92,224,0.15), inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .modal-field .field-row input[type="url"] {
            font-size: 12px;
        }

        .modal-field .delete-btn {
            background: rgba(40,10,10,0.8);
            color: #ff6b6b;
            border: 1px solid rgba(255,70,70,0.2);
            border-radius: 8px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            align-self: flex-end;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }
        .modal-field .delete-btn:hover {
            background: rgba(60,20,20,0.9);
            border-color: rgba(255,70,70,0.5);
            box-shadow: 0 0 20px rgba(255,70,70,0.15);
        }

        .add-section {
            margin-top: 20px;
            border-top: 1px solid rgba(94,92,224,0.15);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .add-section .add-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .add-section .add-row input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(94,92,224,0.15);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            min-width: 120px;
        }
        .add-section .add-row input:focus {
            outline: none;
            border-color: #5e5ce0;
            box-shadow: 0 0 15px rgba(94,92,224,0.15), inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .add-section .add-btn {
            background: linear-gradient(135deg, #2a2a5a, #1a1a3a);
            color: #b8b8ff;
            border: 1px solid rgba(94,92,224,0.3);
            border-radius: 8px;
            padding: 8px 18px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
            align-self: flex-end;
        }
        .add-section .add-btn:hover {
            background: linear-gradient(135deg, #3a3a7a, #2a2a5a);
            border-color: #5e5ce0;
            box-shadow: 0 0 20px rgba(94,92,224,0.2);
        }

        .cover-btn {
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
            color: #aab;
            border: 1px solid rgba(100,100,200,0.2);
            border-radius: 8px;
            padding: 8px 18px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
            align-self: flex-end;
            width: 100%;
            text-align: center;
        }
        .cover-btn.active {
            background: linear-gradient(135deg, #3a3a6a, #2a2a5a);
            border-color: #5e5ce0;
            color: #d0d0ff;
            box-shadow: 0 0 20px rgba(94,92,224,0.15);
        }
        .cover-btn:hover {
            border-color: rgba(94,92,224,0.5);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .modal-actions button {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-save {
            background: linear-gradient(135deg, #5e5ce0, #4a48b0);
            color: #fff;
            box-shadow: 0 4px 15px rgba(94,92,224,0.3);
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(94,92,224,0.4);
        }
        .btn-cancel {
            background: rgba(40,40,40,0.8);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-cancel:hover {
            background: rgba(60,60,60,0.9);
            color: #ddd;
        }

        @media (max-width: 480px) {
            .modal-box {
                padding: 20px 16px 24px;
                max-width: 100%;
                border-radius: 16px;
            }
            .modal-field {
                padding: 12px 12px;
            }
            .modal-field .field-row {
                flex-wrap: wrap;
            }
            .modal-field .field-row label {
                min-width: 30px;
                font-size: 9px;
            }
            .add-section .add-row input {
                min-width: 80px;
                font-size: 12px;
            }
            .modal-actions button {
                padding: 8px 16px;
                font-size: 12px;
            }
            .modal-header h2 {
                font-size: 16px;
            }
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4b6cb7">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

    <!-- Barre de navigation dynamique -->
    <nav id="nav-bar" class="nav-bar">
        <div id="socket-power" class="btn-socket power-socket">
            <div class="led"></div>
            <button id="btn-power" class="pwa-btn power-btn">OFF</button>
        </div>
    </nav>

    <main class="workspace">
        <div id="smartphone" class="phone-container">
            <div class="screen-glass"></div>
            <div class="power-overlay" id="power-overlay"></div>
            <div id="content-area" class="content-area"></div>
        </div>
    </main>

    <!-- MODALE -->
    <div id="link-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>⚡ CONFIGURER</h2>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <div id="modal-fields-container"></div>
            <div class="add-section">
                <div class="add-row">
                    <input type="text" id="add-name" placeholder="Nom" />
                    <input type="url" id="add-url" placeholder="https://..." />
                </div>
                <button class="add-btn" id="add-btn">➕ Ajouter</button>
                <button class="cover-btn" id="cover-btn">Cover: OFF</button>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modal-cancel-btn">Annuler</button>
                <button class="btn-save" id="modal-save-btn">Sauvegarder</button>
            </div>
        </div>
    </div>

    <script>
        // ===== GESTION DES DONNÉES =====
        const STORAGE_KEY = 'pwaList';
        const COVER_KEY = 'coverEnabled';
        let pwaList = [];
        let coverEnabled = false;

        const ledColors = [
            '#ff453a', '#5e5ce0', '#0a84ff', '#ff375f', 
            '#32d74b', '#ffd60a', '#bf5af2', '#ff9f0a'
        ];

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    pwaList = JSON.parse(stored);
                } catch (e) {
                    pwaList = [];
                }
            }
            if (pwaList.length === 0) {
                pwaList = [
                    { id: 'id-1', name: 'Master', url: 'https://mekeirish.github.io/Mastercode/' },
                    { id: 'id-2', name: 'Rea', url: 'https://mekeirish.github.io/Reaactorturbo/' },
                    { id: 'id-3', name: 'Brain', url: 'https://mekeirish.github.io/Braincode/' },
                    { id: 'id-4', name: 'Sniper', url: 'https://mekeirish.github.io/Snipercode/' },
                    { id: 'id-5', name: 'Lab', url: 'https://mekeirish.github.io/Labcode/' },
                    { id: 'id-6', name: 'Hub', url: 'https://mekeirish.github.io/Hubcode/' },
                    { id: 'id-7', name: 'Ibra', url: 'https://mekeirish.github.io/Ibracode/' },
                    { id: 'id-8', name: 'Logo', url: 'https://mekeirish.github.io/Logomaker/' }
                ];
                saveData();
            }

            const coverStored = localStorage.getItem(COVER_KEY);
            coverEnabled = coverStored === 'true';
            updateCoverUI();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(pwaList));
        }

        function saveCoverState() {
            localStorage.setItem(COVER_KEY, String(coverEnabled));
        }

        function renderNav() {
            const nav = document.getElementById('nav-bar');
            const powerSocket = document.getElementById('socket-power');
            nav.innerHTML = '';
            nav.appendChild(powerSocket);

            pwaList.forEach((item, index) => {
                const socket = document.createElement('div');
                socket.className = 'btn-socket';
                socket.id = `socket-${item.id}`;
                const led = document.createElement('div');
                led.className = 'led';
                const color = ledColors[index % ledColors.length];
                led.style.backgroundColor = '#222';
                led.dataset.color = color;
                const btn = document.createElement('button');
                btn.className = 'pwa-btn';
                btn.id = `btn-${item.id}`;
                btn.textContent = item.name;
                btn.onclick = function() { switchTab(item.id); };
                socket.appendChild(led);
                socket.appendChild(btn);
                nav.appendChild(socket);
            });
        }

        function renderIframes() {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            pwaList.forEach(item => {
                const iframe = document.createElement('iframe');
                iframe.id = `iframe-${item.id}`;
                iframe.dataset.src = item.url;
                iframe.allow = 'geolocation; microphone; camera; clipboard-write; clipboard-read';
                container.appendChild(iframe);
            });
        }

        function renderAll() {
            renderNav();
            renderIframes();
            if (activePwaId) {
                const btn = document.getElementById(`btn-${activePwaId}`);
                if (btn) {
                    btn.classList.add('active');
                    const socket = document.getElementById(`socket-${activePwaId}`);
                    if (socket) socket.classList.add('active-pwa');
                    const iframe = document.getElementById(`iframe-${activePwaId}`);
                    if (iframe) iframe.classList.add('active');
                }
            }
            updateCoverUI();
        }

        function updateCoverUI() {
            const overlay = document.getElementById('power-overlay');
            const coverBtn = document.getElementById('cover-btn');
            if (coverEnabled) {
                overlay.classList.add('cover-image');
                if (coverBtn) {
                    coverBtn.textContent = 'Cover: ON';
                    coverBtn.classList.add('active');
                }
            } else {
                overlay.classList.remove('cover-image');
                if (coverBtn) {
                    coverBtn.textContent = 'Cover: OFF';
                    coverBtn.classList.remove('active');
                }
            }
            if (!isPoweredOn) {
                if (coverEnabled) overlay.classList.add('cover-image');
                else overlay.classList.remove('cover-image');
            } else {
                overlay.classList.remove('cover-image');
            }
        }

        function toggleCover() {
            coverEnabled = !coverEnabled;
            saveCoverState();
            updateCoverUI();
            if (!isPoweredOn) {
                const overlay = document.getElementById('power-overlay');
                if (coverEnabled) overlay.classList.add('cover-image');
                else overlay.classList.remove('cover-image');
            }
        }

        let activePwaId = null;

        function switchTab(id) {
            if (!isPoweredOn) return;
            if (activePwaId === id) return;
            playIndustrialHum();

            document.querySelectorAll('.pwa-btn:not(#btn-power)').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.btn-socket:not(#socket-power)').forEach(socket => socket.classList.remove('active-pwa'));
            document.querySelectorAll('.content-area iframe').forEach(iframe => iframe.classList.remove('active'));

            const btn = document.getElementById(`btn-${id}`);
            if (btn) btn.classList.add('active');
            const socket = document.getElementById(`socket-${id}`);
            if (socket) socket.classList.add('active-pwa');
            const iframe = document.getElementById(`iframe-${id}`);
            if (iframe) {
                iframe.classList.add('active');
                if (!iframe.src || iframe.src === window.location.href) {
                    iframe.src = iframe.dataset.src;
                }
            }
            activePwaId = id;
        }

        // MODALE
        const modalOverlay = document.getElementById('link-modal');
        const modalFieldsContainer = document.getElementById('modal-fields-container');
        const closeModalBtn = document.getElementById('modal-close-btn');
        const cancelModalBtn = document.getElementById('modal-cancel-btn');
        const saveModalBtn = document.getElementById('modal-save-btn');
        const addNameInput = document.getElementById('add-name');
        const addUrlInput = document.getElementById('add-url');
        const addBtn = document.getElementById('add-btn');
        const coverBtn = document.getElementById('cover-btn');

        function populateModal() {
            modalFieldsContainer.innerHTML = '';
            pwaList.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'modal-field';
                div.dataset.id = item.id;

                const nameRow = document.createElement('div');
                nameRow.className = 'field-row';
                const nameLabel = document.createElement('label');
                nameLabel.textContent = 'Nom';
                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.value = item.name;
                nameInput.id = `modal-name-${item.id}`;
                nameRow.appendChild(nameLabel);
                nameRow.appendChild(nameInput);
                div.appendChild(nameRow);

                const urlRow = document.createElement('div');
                urlRow.className = 'field-row';
                const urlLabel = document.createElement('label');
                urlLabel.textContent = 'Lien';
                const urlInput = document.createElement('input');
                urlInput.type = 'url';
                urlInput.value = item.url;
                urlInput.id = `modal-url-${item.id}`;
                urlRow.appendChild(urlLabel);
                urlRow.appendChild(urlInput);
                div.appendChild(urlRow);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '🗑 Supprimer';
                deleteBtn.dataset.id = item.id;
                deleteBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idToDelete = this.dataset.id;
                    if (confirm(`Supprimer "${pwaList.find(i => i.id === idToDelete)?.name}" ?`)) {
                        pwaList = pwaList.filter(i => i.id !== idToDelete);
                        saveData();
                        if (activePwaId === idToDelete) activePwaId = null;
                        populateModal();
                        renderAll();
                    }
                });
                div.appendChild(deleteBtn);

                modalFieldsContainer.appendChild(div);
            });
            updateCoverUI();
            if (coverBtn) {
                coverBtn.textContent = coverEnabled ? 'Cover: ON' : 'Cover: OFF';
                coverBtn.classList.toggle('active', coverEnabled);
            }
        }

        function openModal() {
            populateModal();
            modalOverlay.classList.add('open');
        }

        function closeModal() {
            modalOverlay.classList.remove('open');
        }

        function saveModalChanges() {
            pwaList.forEach(item => {
                const nameInput = document.getElementById(`modal-name-${item.id}`);
                const urlInput = document.getElementById(`modal-url-${item.id}`);
                if (nameInput) item.name = nameInput.value.trim() || item.name;
                if (urlInput) item.url = urlInput.value.trim() || item.url;
            });
            saveData();
            renderAll();
            if (activePwaId) {
                const iframe = document.getElementById(`iframe-${activePwaId}`);
                if (iframe) {
                    const newUrl = pwaList.find(i => i.id === activePwaId)?.url;
                    if (newUrl && newUrl !== iframe.dataset.src) {
                        iframe.dataset.src = newUrl;
                        if (iframe.classList.contains('active')) {
                            iframe.src = newUrl;
                        }
                    }
                }
            }
            closeModal();
        }

        function addItem() {
            const name = addNameInput.value.trim();
            const url = addUrlInput.value.trim();
            if (!name || !url) {
                alert('Veuillez remplir le nom et l\'URL.');
                return;
            }
            const newId = 'id-' + Date.now();
            pwaList.push({ id: newId, name, url });
            saveData();
            addNameInput.value = '';
            addUrlInput.value = '';
            populateModal();
            renderAll();
        }

        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);
        saveModalBtn.addEventListener('click', saveModalChanges);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        addBtn.addEventListener('click', addItem);
        coverBtn.addEventListener('click', toggleCover);
        addUrlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addItem();
        });
        addNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addUrlInput.focus();
        });

        // LONG PRESS POWER
        const powerBtn = document.getElementById('btn-power');
        let pressTimer = null;
        let isLongPress = false;

        function startPressTimer(e) {
            isLongPress = false;
            pressTimer = setTimeout(() => {
                isLongPress = true;
                e.preventDefault();
                openModal();
                clearTimeout(pressTimer);
                pressTimer = null;
            }, 600);
        }

        function clearPressTimer() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        }

        powerBtn.addEventListener('mousedown', startPressTimer);
        powerBtn.addEventListener('mouseup', clearPressTimer);
        powerBtn.addEventListener('mouseleave', clearPressTimer);
        powerBtn.addEventListener('touchstart', startPressTimer, { passive: false });
        powerBtn.addEventListener('touchend', clearPressTimer);
        powerBtn.addEventListener('touchcancel', clearPressTimer);

        powerBtn.addEventListener('click', function(e) {
            if (isLongPress) {
                e.stopPropagation();
                e.preventDefault();
                isLongPress = false;
            }
        }, true);

        // POWER TOGGLE
        let isPoweredOn = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playIndustrialHum() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        powerBtn.onclick = function(e) {
            if (isLongPress) {
                isLongPress = false;
                return;
            }
            togglePower();
        };

        function togglePower() {
            playIndustrialHum();
            const socketPower = document.getElementById('socket-power');
            const smartphone = document.getElementById('smartphone');
            const overlay = document.getElementById('power-overlay');

            isPoweredOn = !isPoweredOn;

            if (isPoweredOn) {
                powerBtn.textContent = 'ON';
                powerBtn.classList.add('active');
                socketPower.classList.add('active-power');
                smartphone.classList.add('hub-powered-on');
                overlay.classList.remove('cover-image');
                if (!activePwaId && pwaList.length > 0) {
                    switchTab(pwaList[0].id);
                } else if (activePwaId) {
                    const iframe = document.getElementById(`iframe-${activePwaId}`);
                    if (iframe) {
                        iframe.classList.add('active');
                        if (!iframe.src || iframe.src === window.location.href) {
                            iframe.src = iframe.dataset.src;
                        }
                    }
                    const btn = document.getElementById(`btn-${activePwaId}`);
                    if (btn) btn.classList.add('active');
                    const socket = document.getElementById(`socket-${activePwaId}`);
                    if (socket) socket.classList.add('active-pwa');
                }
            } else {
                powerBtn.textContent = 'OFF';
                powerBtn.classList.remove('active');
                socketPower.classList.remove('active-power');
                smartphone.classList.remove('hub-powered-on');
                if (coverEnabled) overlay.classList.add('cover-image');
                else overlay.classList.remove('cover-image');
                document.querySelectorAll('.pwa-btn:not(#btn-power)').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.btn-socket:not(#socket-power)').forEach(socket => socket.classList.remove('active-pwa'));
                document.querySelectorAll('.content-area iframe').forEach(iframe => iframe.classList.remove('active'));
                activePwaId = null;
            }
        }

        // HUB ROUTEUR POSTMESSAGE
        window.addEventListener('message', (event) => {
            const msg = event.data;
            if (msg && msg.type === 'HUB_ROUTER' && msg.target) {
                const targetIframe = document.getElementById(`iframe-${msg.target}`);
                if (targetIframe) {
                    if (!targetIframe.src || targetIframe.src === window.location.href) {
                        targetIframe.src = targetIframe.dataset.src;
                        targetIframe.onload = () => {
                            targetIframe.contentWindow.postMessage(msg.payload, '*');
                        };
                    } else {
                        targetIframe.contentWindow.postMessage(msg.payload, '*');
                    }
                }
            }
        });

        // SERVICE WORKER CLEANUP
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (let registration of registrations) {
                    registration.unregister();
                    console.log('Service Worker désactivé.');
                }
            });
        }

        // INIT
        loadData();
        renderAll();
        isPoweredOn = false;
        powerBtn.textContent = 'OFF';
        powerBtn.classList.remove('active');
        document.getElementById('socket-power').classList.remove('active-power');
        document.getElementById('smartphone').classList.remove('hub-powered-on');
        const overlay = document.getElementById('power-overlay');
        if (coverEnabled) overlay.classList.add('cover-image');
        else overlay.classList.remove('cover-image');
    </script>
</body>
</html>
